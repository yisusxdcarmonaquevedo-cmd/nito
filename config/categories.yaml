# Taxonomía de la web (6 categorías / subcategorías) y palabras clave para
# clasificar cada oferta. La clasificación fina la afinará Gemini más adelante;
# estas keywords sirven como primer intento barato (sin gastar cuota de IA).

categorias:
  tecnologia:
    nombre: "Tecnología y Gadgets"
    keywords: [smartphone, iphone, android, charger, charging, cable, power bank,
               laptop, notebook, tablet, ipad, ssd, hdd, gpu, cpu, ram, memory,
               headphone, earbud, airpods, speaker, soundbar, bluetooth, console,
